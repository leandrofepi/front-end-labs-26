<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Boldonse&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/fale-conosco.css">
    <title>Fale Conosco</title>
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Fale Conosco</h1>
        <p>
          Estamos aqui para ajudar! Preencha o formulário abaixo e entraremos em
          contato com você o mais breve possível.
        </p>
      </header>
      <form action="./send-message.html" method="get">
        <div class="form-group">
          <label for="name">Primeiro Nome</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Seu nome..."
            required
            maxlength="40"
            minlength="2"
          />
        </div>
        <div class="form-group">
          <label for="last_name">Último Nome</label>
          <input
            type="text"
            id="last_name"
            name="last_name"
            placeholder="Seu sobrenome..."
            required
            maxlength="60"
            minlength="2"
          />
        </div>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="Seu email..."
            required
            maxlength="30"
          />
        </div>
        <div class="form-group">
          <label for="pais">País</label>
          <select name="pais" id="pais" required>
            <option value="" disabled selected>Selecione seu país...</option>
            <option value="brasil">Brasil</option>
            <option value="portugal">Portugal</option>
            <option value="angola">Angola</option>
            <option value="moçambique">Moçambique</option>
          </select>
        </div>
        <div class="form-group">
          <label for="message">Assunto</label>
          <textarea
            name="message"
            id="message"
            placeholder="Escreva aqui..."
            required
            maxlength="500"
          ></textarea>
        </div>
        <div class="btn-container">
          <input type="reset" value="Limpar" />
          <input type="submit" value="Enviar" />
        </div>
      </form>
      <footer class="footer-contact">
        <p>Em caso de dúvidas entre em contato 📞</p>
      </footer>
    </main>
  </body>
</html>
